<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arrecadação de Impostos PE 2026</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f5f7fb;
    padding:30px;
}

header{
    margin-bottom:30px;
}

header h1{
    color:#1b263b;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    color:#777;
    font-size:14px;
}

.card p{
    font-size:28px;
    font-weight:bold;
    color:#1f3c88;
    margin-top:10px;
}

.dashboard{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.box{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.box h2{
    margin-bottom:20px;
    color:#1b263b;
}

.ranking{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.item{
    display:flex;
    justify-content:space-between;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    background:#f8f9fc;
    transition:.3s;
}

.item:hover{
    background:#edf2ff;
    transform:translateX(5px);
}

.nome{
    font-weight:600;
}

.valor{
    color:#2a9d8f;
    font-weight:bold;
}

@media(max-width:900px){

.dashboard{
    grid-template-columns:1fr;
}

}

.fade{
    animation:fade .8s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<header>
<h1>📊 Painel de Arrecadação de Impostos - Pernambuco 2026</h1>
</header>

<div class="cards">

<div class="card fade">
<h3>Total Arrecadado</h3>
<p id="totalArrecadado">R$ 0,00</p>
</div>

<div class="card fade">
<h3>Quantidade de Impostos</h3>
<p id="qtdImpostos">0</p>
</div>

</div>

<div class="dashboard">

<div class="box">
<h2>Participação por Imposto</h2>
<canvas id="graficoPizza"></canvas>
</div>

<div class="box">
<h2>Ranking de Arrecadação</h2>
<canvas id="graficoBarra"></canvas>
</div>

</div>

<div class="ranking">
<h2>🏆 Lista Completa</h2>

<div id="listaImpostos"></div>

</div>

<script>

const urlDados2026 =
"https://dados.pe.gov.br/dataset/bf9f2030-637c-4ea2-9438-f088c0968a75/resource/3637f927-f821-4b4a-8c23-eff181a64dd4/download/receitas_totais_2026_20260602.json";

const tradutorImpostos = {

"1114501101":"ICMS",
"1114501201":"ICMS - Multas",
"1114501301":"ICMS - Dívida Ativa",
"1114501401":"ICMS - Multas Dívida Ativa",

"1112510101":"IPVA",
"1112510201":"IPVA - Multas",
"1112510301":"IPVA - Dívida Ativa",
"1112510401":"IPVA - Multas Dívida Ativa",

"1114511101":"ITCD",

"1113031101":"IRRF - Trabalho",
"1113034101":"IRRF - Outros",

"1114502101":"Fecoep"

};

let pizzaChart;
let barraChart;

async function carregarImpostos(){

try{

const response = await fetch(urlDados2026);

const dados = await response.json();

const registros = dados.campos || [];

const impostos = registros.filter(item => {

const especie = (item.especie || "").toUpperCase();

return especie.includes("IMPOSTO");

});

let somaTotal = 0;

const lista = impostos.map(item=>{

const valor =
parseFloat(item.valora_arrecadado) || 0;

const codigo =
String(item.natureza_receita).trim();

const nome =
tradutorImpostos[codigo] ||
item.especie;

somaTotal += valor;

return {
nome,
valor
};

})
.filter(i=>i.valor>0)
.sort((a,b)=>b.valor-a.valor);

document.getElementById("totalArrecadado").innerText =
somaTotal.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
});

document.getElementById("qtdImpostos").innerText =
lista.length;

const container =
document.getElementById("listaImpostos");

container.innerHTML="";

lista.forEach(item=>{

container.innerHTML += `
<div class="item fade">
<div class="nome">${item.nome}</div>
<div class="valor">
${item.valor.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
})}
</div>
</div>
`;

});

const nomes =
lista.slice(0,10).map(i=>i.nome);

const valores =
lista.slice(0,10).map(i=>i.valor);

if(pizzaChart) pizzaChart.destroy();

pizzaChart = new Chart(
document.getElementById("graficoPizza"),
{
type:"pie",
data:{
labels:nomes,
datasets:[{
data:valores
}]
}
}
);

if(barraChart) barraChart.destroy();

barraChart = new Chart(
document.getElementById("graficoBarra"),
{
type:"bar",
data:{
labels:nomes,
datasets:[{
label:"Arrecadação",
data:valores
}]
}
}
);

}
catch(e){

console.error(e);

}

}

carregarImpostos();

/*
Atualiza sozinho a cada 60 segundos
*/
setInterval(carregarImpostos,60000);

</script>

</body>
</html>
